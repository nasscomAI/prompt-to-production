name: PR Validation

on:
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  commit-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check Commit Message Format
        run: |
          echo "=== Workflow version: v3-from-main ==="
          # Fetch the lint script from main so forks always run the latest rules
          curl -sf "https://raw.githubusercontent.com/nasscomAI/prompt-to-production/main/.github/commit-lint.sh" -o /tmp/commit-lint.sh
          bash /tmp/commit-lint.sh

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Add any required packages here if needed later.
      - name: Check Python Syntax (UC-0A)
        run: python -m py_compile uc-0a/classifier.py
      - name: Check Python Syntax (UC-0B, UC-0C, UC-X)
        run: |
          python -m py_compile uc-0b/app.py
          python -m py_compile uc-0c/app.py
          python -m py_compile uc-x/app.py
